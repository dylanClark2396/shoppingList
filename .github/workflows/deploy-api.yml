name: Deploy API (Lambda)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infra/api.yml'
      - '.github/workflows/deploy-api.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install and build backend
        working-directory: backend
        run: |
          pnpm install
          pnpm run build

      - name: Create deployment archive
        working-directory: backend
        run: zip -r ../api-release.zip package.json dist/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: us-east-2

      - name: Upload artifact to S3
        run: aws s3 cp api-release.zip s3://${{ secrets.DEPLOY_BUCKET }}/api-release.zip

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/api.yml \
            --stack-name prjmanager-api \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              DeployBucket="${{ secrets.DEPLOY_BUCKET }}" \
              CognitoUserPoolId="${{ secrets.COGNITO_USER_POOL_ID }}" \
              CognitoClientId="${{ secrets.COGNITO_CLIENT_ID }}" \
              S3ImagesBucket="${{ secrets.S3_IMAGES_BUCKET }}" \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name prjmanager-api \
            --s3-bucket ${{ secrets.DEPLOY_BUCKET }} \
            --s3-key api-release.zip
          aws lambda wait function-updated --function-name prjmanager-api
